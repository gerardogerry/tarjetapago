<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GS Premium Pay</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041885.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark glass-nav fixed-top">
<div class="container">

<a class="navbar-brand d-flex align-items-center">
<img src="https://cdn-icons-png.flaticon.com/512/1041/1041885.png" width="30" class="me-2">
GS PAY
</a>

<span class="text-white-50">
Gerardo Silva - 22201128
</span>

</div>
</nav>

<!-- MAIN -->
<main class="container main-container">

<div class="row align-items-center g-5">

<!-- TARJETA -->
<div class="col-lg-6 d-flex justify-content-center">

<div class="card-3d-wrapper">
<div id="card-inner" class="card-inner">

<!-- FRONT -->
<div class="card-front">

<div class="card-brands">

<img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg">
</div>

<div id="view-number" class="card-number">
**** **** **** ****
</div>

<div class="card-info">
<div>
<small>TITULAR</small>
<div id="view-name">NOMBRE</div>
</div>

<div>
<small>EXPIRA</small>
<div id="view-expiry">DD/MM/YY</div>
</div>
</div>

</div>

<!-- BACK -->
<div class="card-back">

<div class="mag-stripe"></div>

<div class="cvv-area">
<small>CVV</small>
<div id="view-cvv" class="cvv-box">***</div>
</div>

</div>

</div>
</div>

</div>

<!-- FORM -->
<div class="col-lg-6">

<form class="glass-form p-4">

<h2 class="mb-4">Detalles de Pago</h2>

<input type="text" id="input-number" maxlength="19" class="form-control mb-3" placeholder="Número de tarjeta">

<input type="text" id="input-name" maxlength="26" class="form-control mb-3" placeholder="Nombre del titular">

<div class="row mb-3">
<div class="col">
<select id="exp-day" class="form-select"></select>
</div>
<div class="col">
<select id="exp-month" class="form-select"></select>
</div>
<div class="col">
<select id="exp-year" class="form-select"></select>
</div>
</div>

<input type="password" id="input-cvv" maxlength="4" class="form-control mb-3" placeholder="CVV">

<button class="btn btn-premium w-100">CONFIRMAR PAGO</button>

</form>

</div>

</div>
</main>

<!-- FOOTER -->
<footer class="footer text-center">
<p>© 2026 - Gerardo Silva Escorza</p>
<p>.Ingeniería en Sistemas Computacionales.</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
